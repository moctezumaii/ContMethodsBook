<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="100%" height="100%" role="img" aria-label="Research triangle">
  <title>Research — Method / Data / Question triangle</title>
  <style>
    .tri-bg { fill:#fff8e1; stroke:#333; stroke-width:2; }
    .label { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; fill:#111; font-weight:700; font-size:14px; }
    .sub { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; fill:#111; font-size:11px; font-weight:400; }
    .connector { stroke:#444; stroke-width:1; stroke-dasharray:4 3; }
  </style>

  <!-- triangle -->
  <polygon class="tri-bg" points="160,12 308,235 12,235"/>

  <!-- corner labels -->
  <text class="label" x="160" y="52" text-anchor="middle">RESEARCH QUESTION</text>
  <text class="sub" x="160" y="70" text-anchor="middle">(N treatment effect)</text>

  <text class="label" x="46" y="215" text-anchor="middle">DATA</text>

  <text class="label" x="274" y="215" text-anchor="middle">METHOD</text>

  <!-- optional center connector lines -->
  <line class="connector" x1="160" y1="60" x2="90" y2="195" />
  <line class="connector" x1="160" y1="60" x2="230" y2="195" />
  <line class="connector" x1="90" y1="195" x2="230" y2="195" />
</svg>
